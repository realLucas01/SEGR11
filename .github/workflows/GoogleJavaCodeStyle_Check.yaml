name: Check for Google Code Style

on: 
  pull_request:
    paths:
      - 'java_projekt/**'

permissions: 
  contents: read
  pull-requests: write

jobs:
  checkstyle_job:
    runs-on: ubuntu-latest
    name: Deploy Reviewdog
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Run java checkstyle
    # You may pin to the exact commit or the version.
    # uses: nikitasavinov/checkstyle-action@79490c0fdcc3ab5dd2b50a0e82a5bfc4fe63f0a9
      uses: nikitasavinov/checkstyle-action@master
      with:
        # GITHUB_TOKEN.
        #github_token:
        # Report level for reviewdog [info,warning,error]
        # optional, default is info
        level: 'error'
        # Reporter of reviewdog command [github-pr-check,github-pr-review]
        reporter: 'github-pr-check'
        # Filtering for the reviewdog command [added,diff_context,file,nofilter]. Default is `added`.
        filter_mode: 'diff_context'
        # Exit code for reviewdog when errors are found [true,false]. Default is `false`.
        fail_on_error: 'true'
        # Checkstyle config file
        checkstyle_config: 'google_checks.xml'
        # Checkstyle version. optional, default is 10.3
        #checkstyle_version: 
        # Working directory relative to the root directory. optional, default is .
        #workdir:
        # Tool name to use for reviewdog reporter. optional, default is reviewdog
        #tool_name:
        # Properties file relative to the root directory. optional, default is 
        #properties_file:
          
