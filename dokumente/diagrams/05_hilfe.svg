<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="320px" preserveAspectRatio="none" style="width:346px;height:320px;background:#FFFFFF;" version="1.1" viewBox="0 0 346 320" width="346px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="monospace" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="232" x="56" y="29.0752">4-Connect&#160;-&#160;Hilfe&#160;(Wireframe)</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="73" x="8" y="59.7363">Hilfe / Regeln</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="85" x="8" y="95.9238">Ziel des Spiels:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="329" x="8" y="115.0176">Vier Steine in einer Reihe (horizontal, vertikal oder diagonal).</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39" x="8" y="151.2051">Ablauf:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="301" x="8" y="170.2988">Spieler setzen abwechselnd einen Stein in eine Spalte.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="279" x="8" y="189.3926">Der Stein f&#228;llt in die tiefste freie Position der Spalte.</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="63" x="8" y="225.5801">Bedienung:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="232" x="8" y="244.6738">Spalte antippen, um einen Stein zu setzen.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="270" x="8" y="263.7676">Neue Runde setzt das Spielfeld jederzeit zurueck.</text><rect fill="#EEEEEE" height="19.0938" rx="5" ry="5" style="stroke:#000000;stroke-width:2.5;" width="68" x="10.5" y="289.998"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="37" x="26" y="304.4551">Zur&#252;ck</text><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="339" y1="45.2793" y2="45.2793"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="339" y1="313.5918" y2="313.5918"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="45.2793" y2="64.373"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="45.2793" y2="64.373"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="249.3105" y2="268.4043"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="249.3105" y2="268.4043"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="174.9355" y2="194.0293"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="174.9355" y2="194.0293"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="100.5605" y2="119.6543"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="100.5605" y2="119.6543"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="230.2168" y2="249.3105"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="230.2168" y2="249.3105"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="155.8418" y2="174.9355"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="155.8418" y2="174.9355"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="81.4668" y2="100.5605"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="81.4668" y2="100.5605"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="285.498" y2="313.5918"/><line style="stroke:#000000;stroke-width:1.0;" x1="339" x2="339" y1="285.498" y2="313.5918"/><line style="stroke:#000000;