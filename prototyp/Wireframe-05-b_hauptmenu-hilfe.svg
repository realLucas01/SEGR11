<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="392px" preserveAspectRatio="none" style="width:399px;height:392px;background:#FFFFFF;" version="1.1" viewBox="0 0 399 392" width="399px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="monospace" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="312" x="42.5" y="29.0752">4-Connect&#160;-&#160;Hauptmen&#252;&#160;Hilfe&#160;(Wireframe)</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="25" x="8" y="59.7363">Hilfe</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="374" x="8" y="95.9238">Dieses System dient zur Auswahl und Nutzung verschiedener Spiele</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="251" x="8" y="113.0176">innerhalb des Inflight-Entertainment-Systems.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="382" x="8" y="147.2051">Im Hauptmen&#252; werden alle verf&#252;gbaren Spiele als Kacheln angezeigt.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="379" x="8" y="181.3926">Durch Anklicken einer Spiel-Kachel wird das jeweilige Spiel gestartet.</text><ellipse cx="13.5" cy="193.623" fill="#000000" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.0;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="220" x="20" y="198.4863">Der Button &#8222;Help&#8220; &#246;ffnet diese Hilfeseite.</text><ellipse cx="13.5" cy="210.7168" fill="#000000" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.0;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="315" x="20" y="215.5801">&#220;ber &#8222;Settings&#8220; k&#246;nnen Einstellungen angepasst werden.</text><ellipse cx="13.5" cy="227.8105" fill="#000000" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.0;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210" x="20" y="232.6738">Mit &#8222;Exit&#8220; wird die Anwendung beendet.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="371" x="8" y="266.8613">Die Bedienung erfolgt vollst&#228;ndig &#252;ber Maus- oder Touch-Eingaben.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="368" x="8" y="283.9551">Alle Funktionen sind &#252;ber klar beschriftete Schaltfl&#228;chen erreichbar.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="370" x="8" y="318.1426">Je nach Spiel k&#246;nnen zus&#228;tzliche Men&#252;s oder Optionen erscheinen,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188" x="8" y="335.2363">z. B. zur Auswahl des Spielmodus.</text><rect fill="#EEEEEE" height="19.0938" rx="5" ry="5" style="stroke:#000000;stroke-width:2.5;" width="92" x="10.5" y="361.4668"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65" x="24" y="375.9238">Hauptmen&#252;</text><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="392" y1="45.2793" y2="45.2793"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="392" y1="385.0605" y2="385.0605"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="45.2793" y2="64.373"/><line style="stroke:#000000;stroke-width:1.0;" x1="392" x2="392" y1="64.373" y2="81.4668"/><line style="stroke:#000000;stroke-width:1.0;" x1="392" x2="392" y1="45.2793" y2="64.373"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="356.9668" y2="385.0605"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="339.873" y2="356.9668"/><line style="stroke:#000000;stroke-width:1.0;" x1="392" x2="392" y1="356.9668" y2="385.0605"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="81.4668" y2="339.873"/><line style="stroke:#000000;stroke-width:1.0;" x1="392" x2="392" y1="339.873" y2="356.9668"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="64.373" y2="81.4668"/><line style="stroke:#000000;stroke-width:1.0;" x1="392" x2="392" y1="81.4668" y2="339.873"/><!--SRC=[LL8xRjj04ErrYYaJ9LIL2qYH33c1d481KWGfLkIGd70r97PdhOI201_4IAKpk5B7c_WadjLAYTFmixFlpPltHaWimeViOykCkK06InCwsI8F9rYIBH7UV2E7fJDRV3iQ-OQuC_e31POcMBbfMUwq1gkMMz-P70kzPQoCzYE0_Jjzw0l6upFPU0o7yyaadSy9FNfO__Q2Iad80drmC0r-PseBWGku2z87hk0UdSzhmW8P7QmxGbL-fY7LxcfZDohAmosNbgfQiWKBEZ74EeragOUVZ5Bhs-thINVeb1QCLKhjKmwdQcESdbpQ6ElXiybhj7g9A-oHAhbIpOFBQvXoOobl58FqLs2MGB0ZLq1XFFp47PBAmrI72hqO9oY9QWnpXSw2IClm_F1dYRPxVdY4uQai6IKwv37buf44hwZXSQCu1QnHXBZo4TGCJseCmu9OHxTMJSGalpFUosNeAyMA918iVf54S59Cg7Fja8iOm0Rr0_-DhSKPninYKKrhRILmtrhhPJXoGHKCfoXhPOBFe2tqysiRyZfJGPNPQEiKtpIwVXEu4MgZNa-QUe8srZZjgxaxAjKbjItNeAMqmr6DLQ-TGyfh3UigwnC2g-aNVwyUzC4FH-areLfNDMRkaw8ltQNhURjYTFm-oUedC9lyjurnkywqsxO8VdAuTDn_VxrAF-A27qQ75m00]--></g></svg>