<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="443px" preserveAspectRatio="none" style="width:630px;height:443px;background:#FFFFFF;" version="1.1" viewBox="0 0 630 443" width="630px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="monospace" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="272" x="178" y="29.0752">4-Connect&#160;-&#160;Spielhilfe&#160;(Wireframe)</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="73" x="8" y="59.7363">Hilfe / Regeln</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="274" x="8" y="95.9238">Kurzbeschreibung der Bedienung und Spielregeln</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="362" x="8" y="130.1113">&#8222;4-Connect&#8220; ist eine digitale Umsetzung des Spiels &#8222;Vier Gewinnt&#8220;.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="581" x="8" y="147.2051">Ziel des Spiels ist es, als erster Spieler vier eigene Spielsteine in einer durchgehenden Linie zu platzieren.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="314" x="8" y="164.2988">Die Linie kann horizontal, vertikal oder diagonal verlaufen.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="584" x="8" y="198.4863">Gespielt wird auf einem vertikal aufgebauten Spielfeld mit mehreren Spalten. Zwei Spieler (oder ein Spieler</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="613" x="8" y="215.5801">gegen den Computer) setzen abwechselnd jeweils einen Spielstein. Durch Antippen oder Anklicken einer Spalte</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="551" x="8" y="232.6738">wird bestimmt, wo der Stein fallen soll. Der Spielstein rutscht anschlie&#223;end automatisch in die tiefste</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194" x="8" y="249.7676">freie Position der gew&#228;hlten Spalte.</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="543" x="8" y="283.9551">Das Spiel endet, sobald ein Spieler vier Steine in einer Reihe erreicht oder das Spielfeld vollst&#228;ndig</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="433" x="8" y="301.0488">gef&#252;llt ist, ohne dass eine Gewinnkombination entstanden ist (Unentschieden).</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="554" x="8" y="335.2363">Die Bedienung erfolgt vollst&#228;ndig &#252;ber eine einfache grafische Oberfl&#228;che. Alle Aktionen wie Spielzug,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="560" x="8" y="352.3301">Neustart oder R&#252;ckkehr ins Men&#252; werden &#252;ber deutlich gekennzeichnete Schaltfl&#228;chen ausgef&#252;hrt und</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="217" x="8" y="369.4238">ben&#246;tigen keine zus&#228;tzlichen Eingaben.</text><rect fill="#EEEEEE" height="19.0938" rx="5" ry="5" style="stroke:#000000;stroke-width:2.5;" width="68" x="10.5" y="412.748"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="37" x="26" y="427.2051">Zur&#252;ck</text><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="623" y1="45.2793" y2="45.2793"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="623" y1="436.3418" y2="436.3418"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="45.2793" y2="64.373"/><line style="stroke:#000000;stroke-width:1.0;" x1="623" x2="623" y1="64.373" y2="81.4668"/><line style="stroke:#000000;stroke-width:1.0;" x1="623" x2="623" y1="45.2793" y2="64.373"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="408.248" y2="436.3418"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="391.1543" y2="408.248"/><line style="stroke:#000000;stroke-width:1.0;" x1="623" x2="623" y1="408.248" y2="436.3418"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="374.0605" y2="391.1543"/><line style="stroke:#000000;stroke-width:1.0;" x1="623" x2="623" y1="391.1543" y2="408.248"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="81.4668" y2="374.0605"/><line style="stroke:#000000;stroke-width:1.0;" x1="623" x2="623" y1="374.0605" y2="391.1543"/><line style="stroke:#000000;stroke-width:1.0;" x1="6" x2="6" y1="64.373" y2="81.4668"/><line style="stroke:#000000;stroke-width:1.0;" x1="623" x2="623" y1="81.4668" y2="374.0605"/><!--SRC=[NLHBRjn64DtFAMefAUFnnXTGBCS1_0iaE04KPD535iaoczM3xg86e2701mcIZSxWbNQyYK_YrysPiP8DFrLThrwzUgI9UQONpru6LQwCdj7DJjXtuXkcipyaSXFTmEUhLUf5TmulL7FZHc-_1BNtoD6xe27jNCKrJZblgyyheiy_uO8RNLpyMi2UqpMtxFNYWkvBQhCSU3F6QSkfwYBBTjGMy95-vbfOyzkezK8fbkhLKlNjopydpj- -_4sIZ5YKgPPMp66aZqDYcnQyj22aNFQx0FurxqKrLovmjyW-FLVWqfeSdZacGqd9u7wNwrbQHhFbj9N6eeL0f7gCLTTonrgpqbjHOPf6sdbd4sfPDrHwNY6-P7kdIbs8Ca5HvzTqnz6aTvv2rg8MrmR56yBUZGqG3YgyvfGP6EqbreHKeJ3yg4UevQqR3KmAsOPzJOCO3GozOmbZOvdKxPxbDELPwGoqKwGqRB43fJpNop3i01lFASkCWDlkkUeILbJJ9mPMbWviz8bA6xhAuj2bcknsI9KkbzfxgNe-2hWmMXgMmU0Eas6mDUr3SSTD1gF6UO-Y5Bm7y755fH75qU0e8wUuUU7vNwm3SbWOd0bYUL-m69bmauxT6bYGwRUGn2HeQTNoVdxel9sKEcf_vGvkeRneS4jXwo3kKysALsx-vuzhbexXAlJA39SL7y7AVkumKRBvGM7ce-xD_EYnQ1XpJQ7BHdTf4VXWvZuCMr5NYBDQCbVybvryzb5pfEg44Je_JO1PVtnd79lWM_jly_bnkzY0ywLn5PYtqJLPGQOFI3P-Vi3pXYwn3BhiSt-qtSlXwvZ6ThtCy9v7a8g7YQ_dnwhlOK88a-WTw_n8UuwPyjAqvj5WYmwpmnewPRMKiQcRgiCU3dtXkp4LTJeWvtz5wRK5tbVB7odrXVqqfld1fWo8s2lHrk7CvkcFwF0x-fDknvZ9qLyvUx