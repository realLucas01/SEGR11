help.title=Help / Rules
help.rules_game=Short description of controls and rules\n\n\
"4-Connect" is a digital implementation of the game "Connect Four".\n\
The objective is to be the first player to place four of your pieces in a continuous line.\n\
The line can be horizontal, vertical, or diagonal.\n\n\
The game is played on a vertically arranged board with multiple columns.\n\
Two players (or a player against the computer) take turns placing a piece.\n\
The player selects a column by tapping or clicking it to determine where the piece will drop.\n\
The piece then automatically falls to the lowest available position in the selected column.\n\n\
The game ends when a player achieves four pieces in a row or the board is completely filled\n\
without any winning combination (draw).\n\n\
The entire interaction is handled through a simple graphical user interface.\n\
All actions such as making a move, restarting, or returning to the menu are performed using clearly labeled buttons\n\
and do not require any additional input.
help.rules_menu: Dieses System dient zur Auswahl und Nutzung verschiedener Spiele\n\
innerhalb des Inflight-Entertainment-Systems.\n\n\
Im Hauptmenü werden alle verfügbaren Spiele als Kacheln angezeigt.\n\n\
\u2022 Durch Anklicken einer Spiel-Kachel wird das jeweilige Spiel gestartet.\n\
\u2022 Der Button 'Help' öffnet diese Hilfeseite.\n\
\u2022 Über 'Settings' können Einstellungen angepasst werden.\n\
\u2022 Mit 'Exit' wird die Anwendung beendet.\n\n\
Die Bedienung erfolgt vollständig über Maus oder Touch-Eingaben.\n\
Alle Funktionen sind über klar beschriftete Schaltflächen erreichbar.\n\n\
Je nach Spiel können zusätzliche Menüs oder Optionen erscheinen,\n\
z. B. zur Auswahl des Spielmodus.
