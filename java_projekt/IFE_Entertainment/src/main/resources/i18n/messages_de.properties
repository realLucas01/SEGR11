help.rules_game=Kurzbeschreibung der Bedienung und Spielregeln\n\n\
\u201E4-Connect\u201C ist eine digitale Umsetzung des Spiels \u201EVier Gewinnt\u201C.\n\
Ziel des Spiels ist es, als erster Spieler vier eigene Spielsteine in einer durchgehenden Linie zu platzieren.\n\
Die Linie kann horizontal, vertikal oder diagonal verlaufen.\n\n\
Gespielt wird auf einem vertikal aufgebauten Spielfeld mit mehreren Spalten.\n\
Zwei Spieler (oder ein Spieler gegen den Computer) setzen abwechselnd jeweils einen Spielstein.\n\
Dabei wird durch Antippen oder Anklicken einer Spalte bestimmt, wo der Stein fallen soll.\n\
Der Spielstein rutscht anschließend automatisch in die tiefste freie Position der gewählten Spalte.\n\n\
Das Spiel endet, sobald ein Spieler vier Steine in einer Reihe erreicht oder das Spielfeld vollständig gefüllt ist,\n\
ohne dass eine Gewinnkombination entstanden ist (Unentschieden).\n\n\
Die Bedienung erfolgt vollständig über eine einfache grafische Oberfläche.\n\
Alle Aktionen wie Spielzug, Neustart oder Rückkehr ins Menü werden über deutlich gekennzeichnete Schaltflächen\n\
ausgeführt und benötigen keine zusätzlichen Eingaben.
help.rules_menu: Dieses System dient zur Auswahl und Nutzung verschiedener Spiele\n\
innerhalb des Inflight-Entertainment-Systems.\n\n\
Im Hauptmenü werden alle verfügbaren Spiele als Kacheln angezeigt.\n\n\
\u2022 Durch Anklicken einer Spiel-Kachel wird das jeweilige Spiel gestartet.\n\
\u2022 Der Button 'Help' öffnet diese Hilfeseite.\n\
\u2022 Über 'Settings' können Einstellungen angepasst werden.\n\
\u2022 Mit 'Exit' wird die Anwendung beendet.\n\n\
Die Bedienung erfolgt vollständig über Maus oder Touch-Eingaben.\n\
Alle Funktionen sind über klar beschriftete Schaltflächen erreichbar.\n\n\
Je nach Spiel können zusätzliche Menüs oder Optionen erscheinen,\n\
z. B. zur Auswahl des Spielmodus.
